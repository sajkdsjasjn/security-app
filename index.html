        "email_leak": { title: "فحص أمان البريد", desc: "نتحقق من سجلات الاختراق النشطة للتأكد من عدم تعرض بريدك لأي عمليات انتحال أو وصول غير مصرح به. نفحص بروتوكولات الأمان (SPF/DKIM) لضمان حماية هويتك." },
        "username_search": { title: "متتبع البصمة الرقمية", desc: "نستخدم تقنيات OSINT لتمشيط المنصات العالمية وتحديد البيانات المكشوفة عنك علناً. نقوم بتحليل المخاطر لحمايتك من عمليات الهندسة الاجتماعية." },
        "shortlink_decoder": { title: "فك تشفير الروابط", desc: "نتبع مسارات إعادة التوجيه (Redirects) للوصول للوجهة النهائية الحقيقية. نقوم بتحليل المحتوى البرمجي للوجهة لضمان خلوها من أي أكواد خبيثة أو سكريبتات تتبع." },

    };

    const params = new URLSearchParams(window.location.search);
    const s = params.get('service') || 'url_scan';
    
    if (data[s]) {
        document.getElementById('title').innerText = data[s].title;
        document.getElementById('desc').innerText = data[s].desc;
    }

    let t = 15;
    let timer = setInterval(() => {
        t--;
        document.getElementById('timer').innerText = t;
        if (t <= 0) {
            clearInterval(timer);
            document.getElementById('timer').style.display = 'none';
            document.getElementById('botLink').style.display = 'inline-block';
        }
    }, 1000);
</script>
