<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://pl30336567.effectivecpmnetwork.com/02/61/15/026115bf98dd2f4ab107ef4e3d255419.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: #12121a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .dashboard { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid #333; text-align: center; }
        .ad-unit { margin: 15px 0; display: flex; justify-content: center; }
        .log-area { background: #000; color: var(--neon); font-family: 'Courier New', monospace; font-size: 11px; text-align: left; padding: 15px; height: 100px; overflow-y: hidden; border-radius: 15px; border: 1px solid #222; margin: 15px 0; }
        .desc-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; text-align: justify; font-size: 13px; line-height: 1.8; border-right: 4px solid var(--neon); color: #ccc; }
        .btn-bot { display: none; background: linear-gradient(45deg, #00f2ff, #0077ff); color: #fff; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: 800; margin-top: 20px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="icon" style="font-size: 40px;">🛡️</div>
    <h1 id="title">جاري تهيئة التحليل...</h1>

    <!-- إعلان 1: فوق -->
    <div class="ad-unit">
        <script async="async" data-cfasync="false" src="https://pl30336739.effectivecpmnetwork.com/05239995227b98566810ce833f3631a1/invoke.js"></script>
    </div>

    <div id="timer" style="font-size: 3rem; color: #ff0055; font-weight: 900;">15</div>
    <div class="log-area" id="logs"></div>
    <div class="desc-box" id="desc">...</div>

    <!-- إعلان 2: في المنتصف -->
    <div class="ad-unit">
        <script>atOptions = {'key' : 'cac1302d33ad200bc40515ba438152ce', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {}};</script>
        <script src="https://www.highperformanceformat.com/cac1302d33ad200bc40515ba438152ce/invoke.js"></script>
    </div>

    <a href="#" id="botLink" class="btn-bot">إكمال الفحص والبدء مع البوت</a>
</div>

<script>
    const data = {
        "url_scan": { icon: "🌐", title: "محلل الروابط الأمني", desc: "نظام الاستخبارات يحلل الرابط الآن عبر 14 محرك فحص عالمي. نتحقق من سجلات النطاق النشطة، ونفك تشفير الـ SSL، ونقارن التوقيعات البرمجية بالثغرات الصفرية (0-Day) لمنع التصيد." },
        "file_scan": { icon: "📁", title: "الفاحص السيبراني للملفات", desc: "نحاكي تشغيل الملف في بيئة (Sandbox) معزولة. نقوم بتفكيك البنية الثنائية للملف وتحليل الهندسة العكسية للكشف عن فيروسات الفدية (Ransomware) وبرمجيات التجسس المتخفية." },
        "password_leak": { icon: "🔑", title: "كاشف اختراق البيانات", desc: "نقارن بصمة بياناتك بقواعد بيانات التسريبات في الشبكة المظلمة. نمسح أكثر من 12 مليار سجل للتأكد من عدم وجود تطابق لبيانات اعتمادك المحمية." },
        "password_strength": { icon: "💪", title: "مقياس التشفير NIST", desc: "نحاكي هجمات التخمين (Brute Force) وهجمات القاموس لاختبار صمود كلمة مرورك أمام خوارزميات فك التشفير وفق معايير المعهد الوطني للمعايير والتقنية." },
        "email_leak": { icon: "📧", title: "مدقق خصوصية البريد", desc: "نفحص سجلات الاختراق النشطة للتأكد من سلامة هويتك الرقمية من ملفات تعريف الارتباط المسروقة (Session Cookies) أو عمليات الانتحال الرقمي." },
        "username_search": { icon: "👤", title: "متتبع البصمة الرقمية", desc: "نستخدم تقنيات OSINT لتمشيط المنصات العالمية وتحديد البيانات المكشوفة عنك علناً، مما يمنع استغلال بصمتك الرقمية في عمليات الهندسة الاجتماعية." },
        "shortlink_decoder": { icon: "🔗", title: "كاشف الروابط المستترة", desc: "نتتبع بروتوكولات التحويل (Redirects) خطوة بخطوة للوصول للوجهة النهائية، ونفحص المحتوى البرمجي قبل توجيهك لضمان عدم وجود سكريبتات ضارة." },
        "whatsapp_link_maker": { icon: "💬", title: "منشئ روابط واتساب", desc: "نولد رابط اتصال مشفر عبر API واتساب الرسمي، مع ضمان خلو الرابط من أي نصوص تتبع خبيثة أو توجيهات مزيفة لضمان تواصل آمن ومباشر." }
    };

    const params = new URLSearchParams(window.location.search);
    const s = params.get('service') || 'url_scan';
    const c = params.get('code') || 'start';
    document.getElementById('botLink').href = `https://t.me/sccanerbot?start=${c}`;
    
    if (data[s]) {
        document.getElementById('icon').innerText = data[s].icon;
        document.getElementById('title').innerText = data[s].title;
        document.getElementById('desc').innerText = data[s].desc;
    }

    let t = 15;
    let timer = setInterval(() => {
        t--;
        document.getElementById('timer').innerText = t;
        document.getElementById('logs').innerHTML += `[SYSTEM] Processing security layer... verified.<br>`;
        if (t <= 0) {
            clearInterval(timer);
            document.getElementById('timer').style.display = 'none';
            document.getElementById('botLink').style.display = 'inline-block';
        }
    }, 1000);
</script>
</body>
</html>
