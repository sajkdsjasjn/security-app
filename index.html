<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز التحليل السيبراني | الحماية الفائقة</title>
    <!-- استيراد خط احترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- كود الإعلان المنبثق (الأقوى للربح) -->
    <script src="https://pl30336567.effectivecpmnetwork.com/02/61/15/026115bf98dd2f4ab107ef4e3d255419.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: #12121a; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .dashboard { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid #333; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        h1 { font-size: 22px; font-weight: 900; margin: 15px 0; color: #fff; }
        .ad-unit { margin: 15px 0; display: flex; justify-content: center; width: 100%; }
        .log-area { background: #000; color: var(--neon); font-family: 'Courier New', monospace; font-size: 12px; text-align: left; padding: 15px; height: 120px; overflow-y: hidden; border-radius: 15px; border: 1px solid #222; margin: 20px 0; }
        .desc-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; text-align: justify; font-size: 14px; line-height: 1.8; border-right: 5px solid var(--neon); }
        .btn-bot { display: none; background: linear-gradient(45deg, #00f2ff, #0077ff); color: #fff; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 18px; margin-top: 20px; transition: 0.3s; }
        .btn-bot:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="icon" style="font-size: 50px;">🛡️</div>
    <h1 id="title">جاري تهيئة التحليل الأمني...</h1>

    <!-- إعلان Native Banner (الأعلى) -->
    <div class="ad-unit">
        <script async="async" data-cfasync="false" src="https://pl30336739.effectivecpmnetwork.com/05239995227b98566810ce833f3631a1/invoke.js"></script>
        <div id="container-05239995227b98566810ce833f3631a1"></div>
    </div>

    <div id="timer" style="font-size: 3.5rem; color: #ff0055; font-weight: 900; margin: 15px 0;">15</div>

    <div class="log-area" id="logs"></div>

    <div class="desc-box" id="desc">...</div>

    <!-- إعلان Banner 300x250 (المنتصف) -->
    <div class="ad-unit">
        <script>atOptions = {'key' : 'cac1302d33ad200bc40515ba438152ce', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {}};</script>
        <script src="https://www.highperformanceformat.com/cac1302d33ad200bc40515ba438152ce/invoke.js"></script>
    </div>

    <a href="#" id="botLink" class="btn-bot">تحميل التقرير الكامل من البوت</a>
</div>

<script>
    const data = {
        "url_scan": { icon: "🌐", title: "محلل الروابط السيبراني", desc: "نظام التحليل العميق يقوم الآن بتمشيط مسار الرابط عبر 14 محرك فحص عالمي. نتحقق من سجلات النطاق النشطة، وفحص تشفير شهادة الـ SSL، ومقارنة البصمات البرمجية بالثغرات الصفرية (0-Day). نضمن حمايتك من هجمات التصيد الاحتيالي قبل فتح الرابط." },
        "file_scan": { icon: "📁", title: "الفاحص السيبراني للملفات", desc: "محرك Sandbox معزول يقوم بتفكيك الأكواد البرمجية للملف. نحلل السلوك الديناميكي (Dynamic Analysis) للكشف عن فيروسات الفدية، أدوات التجسس المخفية، وأكواد التروجان. العملية تضمن سلامة جهازك بنسبة 100% قبل الوصول لأي ملف محمل." }
    };

    // تطبيق البيانات (نفس المنطق السابق)
    const params = new URLSearchParams(window.location.search);
    const s = params.get('service') || 'url_scan';
    const c = params.get('code') || 'start';
    document.getElementById('botLink').href = `https://t.me/sccanerbot?start=${c}`;
    
    if (data[s]) {
        document.getElementById('title').innerText = data[s].title;
        document.getElementById('desc').innerText = data[s].desc;
    }

    let t = 15;
    let timer = setInterval(() => {
        t--;
        document.getElementById('timer').innerText = t;
        document.getElementById('logs').innerHTML += `[SYSTEM] Scanned layer ${15-t}... verified.<br>`;
        if (t <= 0) {
            clearInterval(timer);
            document.getElementById('timer').style.display = 'none';
            document.getElementById('botLink').style.display = 'inline-block';
        }
    }, 1000);
</script>
</body>
</html>
