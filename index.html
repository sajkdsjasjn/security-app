<script>

        "url_scan": { title: "تحليل الروابط العميق", desc: "نظام الاستخبارات يبدأ الآن بتمشيط مسار الرابط عبر 14 محرك فحص عالمي. نتحقق من سجلات النطاق النشطة، ونفك تشفير الـ SSL، ونقارن التوقيعات البرمجية بالثغرات الصفرية (0-Day) لمنع هجمات التصيد الاحتيالي وضمان أمن اتصالاتك بنسبة 100%." },
        "file_scan": { title: "فحص الملفات المعزول", desc: "محرك Sandbox معزول يقوم بتفكيك الأكواد البرمجية للملف. نحلل السلوك الديناميكي (Dynamic Analysis) للكشف عن فيروسات الفدية، وأدوات التجسس المخفية، وأكواد التروجان. العملية تضمن سلامة جهازك من أي ملفات خبيثة قبل التحميل." },

        "username_search": { title: "متتبع البصمة الرقمية", desc: "نستخدم تقنيات OSINT لتمشيط المنصات العالمية وتحديد البيانات المكشوفة عنك علناً. نقوم بتحليل المخاطر الناتجة عن البصمة الرقمية لحمايتك من عمليات الهندسة الاجتماعية وهجمات التتبع." },
        "shortlink_decoder": { title: "فك تشفير الروابط", desc: "نتبع مسارات إعادة التوجيه (Redirects) المتعددة للوصول للوجهة النهائية الحقيقية. نقوم بتحليل المحتوى البرمجي للوجهة قبل توجيهك لضمان خلوها من أي أكواد خبيثة أو سكريبتات تتبع ضارة." },

    };

    const params = new URLSearchParams(window.location.search);
    const s = params.get('service') || 'url_scan';
    const c = params.get('code') || 'start';
    
    document.getElementById('botLink').href = `https://t.me/sccanerbot?start=${c}`;
    
    if (data[s]) {
        document.getElementById('title').innerText = data[s].title;
        document.getElementById('desc').innerText = data[s].desc;
    }

    let t = 15;
    let timer = setInterval(() => {
        t--;
        document.getElementById('timer').innerText = t;
        if (t <= 0) {
            clearInterval(timer);
            document.getElementById('timer').style.display = 'none';
            document.getElementById('botLink').style.display = 'inline-block';
        }
    }, 1000);
</script>
